const enc = new TextEncoder();
const dec = new TextDecoder();
function b64(s){return Uint8Array.from(atob(s), c => c.charCodeAt(0));}
async function unlock(){
  const input=document.getElementById('pw');
  const button=document.getElementById('go');
  const hint=document.getElementById('hint');
  const password=input.value;
  if(!password){hint.textContent='请输入课程密码。';hint.className='hint error';return;}
  button.disabled=true;hint.textContent='正在打开内部资料...';hint.className='hint';
  try{
    const baseKey=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(payload.salt),iterations:250000,hash:'SHA-256'},baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
    const data=b64(payload.data), tag=b64(payload.tag), combined=new Uint8Array(data.length+tag.length);
    combined.set(data);combined.set(tag,data.length);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(payload.iv),tagLength:128},key,combined);
    document.open();document.write(dec.decode(plain));document.close();
  }catch(e){hint.textContent='密码不正确，或资料解密失败。';hint.className='hint error';button.disabled=false;}
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
